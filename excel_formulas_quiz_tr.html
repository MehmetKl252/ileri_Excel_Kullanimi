
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.quiz-wrap { padding: 1.5rem 0; max-width: 640px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.score-badge { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; color: var(--color-text-secondary); }
.score-badge span { font-weight: 500; color: var(--color-text-primary); }
.q-counter { font-size: 13px; color: var(--color-text-secondary); }
.progress-bar-bg { height: 4px; background: var(--color-background-secondary); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 2px; background: #1D9E75; transition: width 0.4s ease; }
.question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.q-category { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: #1D9E75; text-transform: uppercase; margin-bottom: 0.5rem; }
.q-text { font-size: 15px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 0.25rem; }
.q-code { font-family: var(--font-mono); font-size: 13px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; margin: 0.75rem 0; color: var(--color-text-primary); }
.options { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
.opt-btn { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; cursor: pointer; transition: all 0.15s ease; font-size: 14px; color: var(--color-text-primary); font-family: var(--font-mono); }
.opt-btn:hover:not(:disabled) { background: var(--color-background-secondary); border-color: #1D9E75; }
.opt-letter { width: 24px; height: 24px; min-width: 24px; border-radius: 4px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.15s; }
.opt-btn.correct { background: #E1F5EE; border-color: #1D9E75; }
.opt-btn.correct .opt-letter { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.opt-btn.wrong { background: #FCEBEB; border-color: #E24B4A; }
.opt-btn.wrong .opt-letter { background: #E24B4A; color: #fff; border-color: #E24B4A; }
.opt-btn:disabled { cursor: default; }
.feedback { font-size: 13px; font-family: var(--font-sans); padding: 10px 14px; border-radius: var(--border-radius-md); margin-top: 0.75rem; line-height: 1.6; display: none; }
.feedback.show { display: block; }
.feedback.correct-fb { background: #E1F5EE; color: #085041; border: 0.5px solid #5DCAA5; }
.feedback.wrong-fb { background: #FCEBEB; color: #501313; border: 0.5px solid #F09595; }
.next-btn { width: 100%; padding: 12px; border-radius: var(--border-radius-md); background: #1D9E75; color: #fff; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; display: none; font-family: var(--font-sans); }
.next-btn:hover { opacity: 0.88; }
.next-btn.show { display: block; }
.result-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem; text-align: center; display: none; }
.result-card.show { display: block; }
.result-score-ring { width: 100px; height: 100px; margin: 0 auto 1.25rem; position: relative; }
.result-score-ring svg { transform: rotate(-90deg); }
.result-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.result-title { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; color: var(--color-text-primary); }
.result-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 8px; }
.stat-num { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.restart-btn { padding: 11px 28px; border-radius: var(--border-radius-md); background: transparent; border: 0.5px solid var(--color-border-secondary); font-size: 14px; cursor: pointer; color: var(--color-text-primary); font-family: var(--font-sans); transition: background 0.15s; }
.restart-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="quiz-wrap">
  <h2 class="sr-only">Excel Türkçe formülleri etkileşimli quiz — 20 soru</h2>
  <div class="header">
    <div class="score-badge">Puan: <span id="score-display">0</span> / <span id="total-display">20</span></div>
    <div class="q-counter" id="q-counter">Soru 1 / 20</div>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:5%"></div></div>

  <div id="question-area">
    <div class="question-card" id="q-card">
      <div class="q-category" id="q-cat"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-code" id="q-code" style="display:none"></div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="next-btn" id="next-btn">Sonraki soru →</button>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-score-ring">

        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--color-background-secondary)" stroke-width="8"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke="#1D9E75" stroke-width="8"
          stroke-dasharray="263.9" id="ring-fill" stroke-dashoffset="263.9" stroke-linecap="round"/>
      </svg>
      <div class="result-num" id="result-pct">0%</div>
    </div>
    <div class="result-title" id="result-title">Quiz tamamlandı!</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="stat-correct" style="color:#1D9E75">0</div><div class="stat-label">Doğru</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-wrong" style="color:#E24B4A">0</div><div class="stat-label">Yanlış</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">Başarı</div></div>
    </div>
    <button class="restart-btn" id="restart-btn">Tekrar başla</button>
  </div>
</div>

    ans: 1,
    exp: 'METNEÇEVİR (İngilizce: TEXT) sayıyı belirtilen formatta metin olarak döndürür. "#.##0" biçimi binlik ayraç olarak nokta kullanır → sonuç "42.500" olur.'

let current = 0, score = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const shuffledQs = shuffle(questions);

function loadQuestion(idx) {
  const q = shuffledQs[idx];
  answered = false;
  document.getElementById('q-counter').textContent = `Soru ${idx + 1} / 20`;
  document.getElementById('progress-fill').style.width = `${((idx) / 20) * 100 + 5}%`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.text;
  const codeEl = document.getElementById('q-code');
  if (q.code) { codeEl.textContent = q.code; codeEl.style.display = 'block'; }
  else { codeEl.style.display = 'none'; }
  const optsList = document.getElementById('options-list');
  optsList.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${['A','B','C','D'][i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    optsList.appendChild(btn);
  });
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';
}

function selectAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  const q = shuffledQs[current];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (chosen === q.ans) {
    score++;
    document.getElementById('score-display').textContent = score;
    btn.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.textContent = '✓ Doğru! ' + q.exp;
  } else {
    btn.classList.add('wrong');
    allBtns[q.ans].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.textContent = '✗ Yanlış. ' + q.exp;
  }
  document.getElementById('next-btn').className = 'next-btn show';
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current < 20) { loadQuestion(current); }
  else { showResult(); }
};

function showResult() {
  document.getElementById('question-area').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  const pct = Math.round((score / 20) * 100);
  const rc = document.getElementById('result-card');
  rc.classList.add('show');
  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = 20 - score;
  document.getElementById('stat-pct').textContent = pct + '%';
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDashoffset = 263.9 - (pct / 100) * 263.9;
  let title, sub;
  if (pct >= 90) { title = 'Excel uzmanısınız!'; sub = 'Harika! Türkçe formüllere hâkimiyetiniz çok güçlü.'; }
  else if (pct >= 70) { title = 'Çok iyi!'; sub = 'Excel bilginiz kapsamlı, birkaç fonksiyon üzerinde çalışabilirsiniz.'; }
  else if (pct >= 50) { title = 'İyi bir başlangıç!'; sub = 'Temel formülleri biliyorsunuz, Türkçe karşılıklarını pekiştirmeniz faydalı olur.'; }
  else { title = 'Pratik yapma zamanı!'; sub = 'Endişelenmeyin — Türkçe Excel formüllerini tekrar çalışarak hızla gelişebilirsiniz.'; }
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
}

document.getElementById('restart-btn').onclick = () => {
  current = 0; score = 0;
  document.getElementById('score-display').textContent = 0;
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('question-area').style.display = 'block';
  const newShuffled = shuffle(questions);
  newShuffled.forEach((q, i) => shuffledQs[i] = q);
  loadQuestion(0);
};

loadQuestion(0);
</script>
